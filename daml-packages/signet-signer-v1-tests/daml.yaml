sdk-version: 3.5.1
name: signet-signer-v1-tests
version: 0.0.1
source: daml
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../signet-signer-v1/.daml/dist/signet-signer-v1-0.0.1.dar
  - ../signet-eip712/.daml/dist/signet-eip712-0.0.1.dar
  - ../signet-api-fee-v1/.daml/dist/signet-api-fee-v1-1.0.0.dar
  - ../vendor/splice-api-token-metadata-v1-1.0.0.dar
build-options:
  - -Wno-crypto-text-is-alpha
  # Mock templates + daml-script in one package is the point of this test-only
  # DAR (never uploaded to a ledger).
  - -Wno-template-interface-depends-on-daml-script
