name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Daml SDK
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-${{ hashFiles('daml-packages/daml-vault/daml.yaml') }}

      - name: Install Daml SDK
        run: |
          if [ ! -f "$HOME/.dpm/bin/dpm" ]; then
            curl -sSL https://get.digitalasset.com/install/install.sh | sh
          fi
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"
          # Install the SDK toolchain explicitly so a cold/evicted ~/.dpm cache
          # doesn't leave us with the dpm CLI but no SDK. Keep in sync with the
          # sdk-version in daml-packages/*/daml.yaml.
          "$HOME/.dpm/bin/dpm" install 3.5.1

      - name: Build DAR, run Daml tests & generate codegen
        # daml:test / codegen:daml are the single source for the package lists
        # (plain dpm commands, so they run fine before pnpm install).
        run: |
          dpm build --all
          pnpm run daml:test
          pnpm run codegen:daml

      - name: SCU upgrade-check
        # Asserts each new DAR is a valid Smart Contract Upgrade of any baseline
        # staged under daml-packages/<pkg>/prior/. Skips packages with no
        # baseline (e.g. the first release), so it is safe to keep enabled now.
        run: bash scripts/scu-upgrade-check.sh

      - run: pnpm install --frozen-lockfile

      - name: Start Canton sandbox
        # Run inside the daml-vault package so dpm resolves the SDK from its
        # daml.yaml (sdk-version 3.5.1). At the repo root dpm uses the globally
        # active SDK, which the installer sets to the latest release — producing
        # an OpenAPI spec that mismatches the 3.5.1 codegen and library code.
        working-directory: daml-packages/daml-vault
        run: dpm sandbox --json-api-port 7575 --dar .daml/dist/daml-vault-poc-0.0.1.dar &

      - name: Wait for Canton JSON API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7575/docs/openapi > /dev/null 2>&1; then
              echo "Canton sandbox is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Canton sandbox failed to start within 120s"
          exit 1

      - name: Generate OpenAPI types
        working-directory: test
        run: |
          curl -sf http://localhost:7575/docs/openapi -o openapi.yaml
          pnpm exec openapi-typescript openapi.yaml -o ../ts-packages/canton-sig/generated/api/ledger-api.ts

      - name: Build library
        working-directory: ts-packages/canton-sig
        run: pnpm build

      - name: Test library
        working-directory: ts-packages/canton-sig
        run: pnpm test

      - name: Test Daml oracle suites
        run: pnpm -r --filter='@canton/*' run test

      - name: Check
        run: pnpm check

      - name: Test
        working-directory: test
        run: pnpm test
